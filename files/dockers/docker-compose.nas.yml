# NAS deployment via Container Manager (DSM 7.2+)
# Place this file at: /volume1/docker/synology-office-mcp/docker-compose.yml
# .env at:           /volume1/docker/synology-office-mcp/.env
#
# network_mode: host so 127.0.0.1 inside the container = DSM loopback,
# letting the MCP server hit DSM APIs without LAN round-trips.
# Set MCP_AUTH_TOKEN in the .env file; Streamable HTTP refuses to start without it.

services:
  synology-mcp:
    image: ghcr.io/danbao/synology-office-mcp:0.6.1
    container_name: synology-office-mcp
    restart: unless-stopped
    network_mode: host
    env_file:
      - path: /volume1/docker/synology-office-mcp/.env
        required: false
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: 3100
      MCP_HTTP_PATH: /mcp
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
